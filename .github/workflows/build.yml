name: Build Daken Radar APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    
    steps:
      # ========== 1. تحميل الكود ==========
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ========== 2. إعداد Java ==========
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '11'
          cache: 'none'

      # ========== 3. إعداد Python ==========
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ========== 4. تثبيت dependencies ==========
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            libffi-dev \
            libssl-dev \
            libjpeg-dev \
            zlib1g-dev \
            libpng-dev \
            libfreetype6-dev \
            libncurses5-dev \
            libreadline-dev \
            sqlite3 \
            tk-dev \
            xz-utils \
            zip \
            unzip \
            curl \
            wget \
            file \
            openjdk-11-jdk \
            autoconf \
            libtool \
            pkg-config \
            cmake

      # ========== 5. تثبيت Python packages ==========
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install cython==0.29.37
          pip install buildozer==1.5.0

      # ========== 6. إنشاء requirements.txt ==========
      - name: Create requirements.txt
        run: |
          cat > requirements.txt << 'EOF'
          kivy==2.2.1
          EOF

      # ========== 7. التحقق من الملفات ==========
      - name: Verify project files
        run: |
          echo "========================================="
          echo "Checking project files..."
          echo "========================================="
          
          if [ ! -f main.py ]; then
            echo "main.py not found!"
            ls -la
            exit 1
          fi
          
          if [ ! -f buildozer.spec ]; then
            echo "buildozer.spec not found!"
            ls -la
            exit 1
          fi
          
          echo "main.py found"
          echo "buildozer.spec found"
          
          echo ""
          echo "main.py first 10 lines:"
          head -10 main.py
          
          echo ""
          echo "buildozer.spec content:"
          cat buildozer.spec

      # ========== 8. Cache Buildozer ==========
      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      # ========== 9. إعداد Android SDK ==========
      - name: Setup Android SDK
        run: |
          mkdir -p ~/android-sdk
          cd ~/android-sdk
          
          if [ ! -f commandlinetools-linux-9477386_latest.zip ]; then
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          fi
          
          unzip -q -o commandlinetools-linux-9477386_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          yes | ~/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          ~/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-30" "build-tools;30.0.3" "platform-tools" > /dev/null 2>&1
          
          echo "ANDROID_SDK_ROOT=~/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_HOME=~/android-sdk" >> $GITHUB_ENV

      # ========== 10. إعداد Android NDK ==========
      - name: Setup Android NDK
        run: |
          if [ ! -d ~/android-ndk-r23b ]; then
            cd ~
            wget -q https://dl.google.com/android/repository/android-ndk-r23b-linux.zip
            unzip -q android-ndk-r23b-linux.zip
            rm android-ndk-r23b-linux.zip
          fi
          echo "ANDROID_NDK_HOME=~/android-ndk-r23b" >> $GITHUB_ENV
          echo "NDK_HOME=~/android-ndk-r23b" >> $GITHUB_ENV

      # ========== 11. بناء APK ==========
      - name: Build APK
        run: |
          echo "========================================="
          echo "Starting APK build..."
          echo "========================================="
          
          echo "Java version:"
          java -version
          
          echo ""
          echo "Python version:"
          python --version
          
          echo ""
          echo "Buildozer version:"
          buildozer --version
          
          buildozer -v android debug
        env:
          ANDROID_SDK_ROOT: ~/android-sdk
          ANDROID_HOME: ~/android-sdk
          ANDROID_NDK_HOME: ~/android-ndk-r23b
          NDK_HOME: ~/android-ndk-r23b
          JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64

      # ========== 12. التحقق من APK ==========
      - name: Verify APK
        run: |
          echo "========================================="
          echo "Searching for APK files..."
          echo "========================================="
          
          find . -name "*.apk" -type f 2>/dev/null
          
          APK_COUNT=$(find . -name "*.apk" -type f 2>/dev/null | wc -l)
          
          if [ $APK_COUNT -gt 0 ]; then
            echo ""
            echo "APK built successfully!"
            echo "Found $APK_COUNT APK file(s):"
            find . -name "*.apk" -type f -exec ls -lh {} \;
          else
            echo ""
            echo "APK not found!"
            exit 1
          fi

      # ========== 13. نسخ APK ==========
      - name: Copy APK to bin
        run: |
          mkdir -p bin
          find . -name "*.apk" -type f -exec cp {} bin/ \;
          echo "APK copied to bin/"
          ls -lh bin/

      # ========== 14. رفع APK ==========
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Daken-Radar-${{ github.run_number }}
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error

      # ========== 15. رفع السجلات عند الفشل ==========
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-logs-${{ github.run_number }}
          path: |
            .buildozer/
            *.log
          retention-days: 7
